name: Android CI

on:
  push:
    branches: [ "main", "master" ] # 當推送到這些分支時觸發
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: XperiaUpdateCenter-APK
        # 根據你的 build.gradle 配置，產出的檔案路徑通常如下
        path: app/build/outputs/apk/release/XperiaUpdateCenter_v2.2.2.apk
